<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KASIR - QRIZHOP</title>
    <style>
        body { font-family: sans-serif; background: #f4f4f4; padding: 20px; }
        h1 { color: #d32f2f; text-align: center; }
        .order-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 20px; }
        .order-card { background: white; padding: 15px; border-radius: 10px; shadow: 0 4px 6px rgba(0,0,0,0.1); border-left: 5px solid #d32f2f; }
        .order-header { display: flex; justify-content: space-between; border-bottom: 1px solid #eee; padding-bottom: 10px; margin-bottom: 10px; }
        .status-badge { background: #ff9800; color: white; padding: 2px 8px; border-radius: 5px; font-size: 0.8rem; }
        .item-list { font-size: 0.9rem; color: #555; }
        .btn-done { background: #25d366; color: white; border: none; padding: 10px; width: 100%; border-radius: 5px; cursor: pointer; margin-top: 10px; font-weight: bold; }
    </style>
</head>
<body>

    <h1>Panel Kasir QRIZHOP</h1>
    <div class="order-grid" id="order-container">
        </div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getDatabase, ref, onValue, remove } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

    // PAKAI URL YANG SAMA DENGAN WEB 1
    const firebaseConfig = {
        databaseURL: "https://qrizhop-default-rtdb.asia-southeast1.firebasedatabase.app/",
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);

    const orderContainer = document.getElementById('order-container');

    // MENDENGARKAN DATA DARI FIREBASE SECARA REAL-TIME
    const ordersRef = ref(db, 'pesanan');
    onValue(ordersRef, (snapshot) => {
        orderContainer.innerHTML = ""; // Bersihkan tampilan lama
        const data = snapshot.val();
        
        if (data) {
            Object.keys(data).forEach(id => {
                const order = data[id];
                
                // Susun daftar item makanan/minuman
                let itemsText = "";
                for (let prod in order.items) {
                    itemsText += `<li>${prod} (x${order.items[prod].qty})</li>`;
                }

                // Buat kartu pesanan
                const card = document.createElement('div');
                card.className = "order-card";
                card.innerHTML = `
                    <div class="order-header">
                        <strong>${order.pembeli}</strong>
                        <span class="status-badge">${order.metode.toUpperCase()}</span>
                    </div>
                    <ul class="item-list">${itemsText}</ul>
                    <p><strong>Total: Rp ${order.total.toLocaleString()}</strong></p>
                    <small style="color: #999;">${order.waktu}</small>
                    <button class="btn-done" onclick="selesaikanPesanan('${id}')">Selesai / Hapus</button>
                `;
                orderContainer.appendChild(card);
            });
        } else {
            orderContainer.innerHTML = "<p style='text-align:center; width:100%;'>Belum ada pesanan masuk.</p>";
        }
    });

    // FUNGSI UNTUK MENGHAPUS PESANAN JIKA SUDAH SELESAI
    window.selesaikanPesanan = function(id) {
        if(confirm("Pesanan selesai dan akan dihapus dari daftar?")) {
            remove(ref(db, 'pesanan/' + id));
        }
    }
</script>
</body>
</html>
