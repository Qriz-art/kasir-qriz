<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KASIR PANEL - QRIZHOP</title>
    <style>
        :root {
            --primary: #d32f2f;
            --dark: #1a1a1a;
            --bg: #f0f2f5;
            --success: #2ecc71;
        }

        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            background: var(--bg); 
            margin: 0; padding: 20px; 
        }

        /* --- STYLING LOGIN --- */
        #login-overlay {
            position: fixed; top:0; left:0; width:100%; height:100%;
            background: var(--dark); display: flex; justify-content: center;
            align-items: center; z-index: 9999;
        }
        .login-box {
            background: white; padding: 30px; border-radius: 15px;
            text-align: center; box-shadow: 0 10px 25px rgba(0,0,0,0.5);
        }
        .login-box input {
            padding: 10px; width: 200px; border: 1px solid #ddd;
            border-radius: 5px; display: block; margin: 15px auto;
        }
        .btn-login {
            background: var(--primary); color: white; border: none;
            padding: 10px 25px; border-radius: 5px; cursor: pointer; font-weight: bold;
        }

        /* --- STYLING DASHBOARD --- */
        header {
            display: flex; justify-content: space-between; align-items: center;
            background: white; padding: 15px 30px; border-radius: 10px;
            margin-bottom: 20px; box-shadow: 0 2px 5px rgba(0,0,0,0.05);
        }
        header h1 { margin: 0; color: var(--primary); font-size: 1.5rem; }

        .order-grid { 
            display: grid; 
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); 
            gap: 20px; 
        }

        .order-card { 
            background: white; border-radius: 12px; overflow: hidden;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05); border-top: 5px solid var(--primary);
            transition: 0.3s; position: relative;
        }

        .order-body { padding: 20px; }
        .order-id { font-size: 0.7rem; color: #aaa; margin-bottom: 5px; }
        .buyer-name { font-size: 1.2rem; font-weight: bold; color: var(--dark); display: block; margin-bottom: 10px; }
        
        .method-tag {
            background: #eee; padding: 3px 8px; border-radius: 4px;
            font-size: 0.75rem; font-weight: bold; text-transform: uppercase;
        }

        .item-list { 
            list-style: none; padding: 0; margin: 15px 0;
            border-top: 1px dashed #eee; border-bottom: 1px dashed #eee; padding: 10px 0;
        }
        .item-list li { 
            display: flex; justify-content: space-between; font-size: 0.9rem; margin-bottom: 5px;
        }

        .total-price { font-size: 1.1rem; font-weight: bold; color: var(--primary); }

        .btn-done { 
            background: var(--success); color: white; border: none; 
            padding: 12px; width: 100%; cursor: pointer; font-weight: bold;
            font-size: 1rem; transition: 0.3s;
        }
        .btn-done:hover { background: #27ae60; }
    </style>
</head>
<body>

    <div id="login-overlay">
        <div class="login-box">
            <h2 style="margin-top:0">Akses Kasir</h2>
            <p style="color: #666; font-size: 0.9rem;">Masukkan PIN Keamanan</p>
            <input type="password" id="pin-input" placeholder="Masukkan PIN">
            <button class="btn-login" onclick="checkLogin()">Masuk</button>
        </div>
    </div>

    <header>
        <h1>QRIZHOP - Panel Kasir</h1>
        <div>
            <span id="status-koneksi" style="font-size: 0.8rem; color: var(--success);">● Online</span>
            <button onclick="logout()" style="margin-left: 20px; background: none; border: 1px solid #ccc; padding: 5px 10px; border-radius: 5px; cursor: pointer;">Keluar</button>
        </div>
    </header>

    <div class="order-grid" id="order-container">
        </div>

    <audio id="notif-sound" src="https://assets.mixkit.co/active_storage/sfx/2869/2869-preview.mp3" preload="auto"></audio>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getDatabase, ref, onValue, remove, set, push } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

    const firebaseConfig = {
        databaseURL: "https://qrizhop-default-rtdb.asia-southeast1.firebasedatabase.app/",
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);

    // --- KEAMANAN LOGIN ---
    const KODE_AKSES = "1234"; // GANTI PIN KASIR DISINI

    window.checkLogin = function() {
        const input = document.getElementById('pin-input').value;
        if(input === KODE_AKSES) {
            sessionStorage.setItem('isLoggedIn', 'true');
            document.getElementById('login-overlay').style.display = 'none';
        } else {
            alert("PIN Salah!");
        }
    }

    window.logout = function() {
        sessionStorage.removeItem('isLoggedIn');
        location.reload();
    }

    // Cek status login saat halaman dibuka
    if(sessionStorage.getItem('isLoggedIn') === 'true') {
        document.getElementById('login-overlay').style.display = 'none';
    }

    // --- LOGIKA KASIR ---
    const orderContainer = document.getElementById('order-container');
    const sound = document.getElementById('notif-sound');
    let lastOrderCount = 0;

    const ordersRef = ref(db, 'pesanan');
    onValue(ordersRef, (snapshot) => {
        orderContainer.innerHTML = "";
        const data = snapshot.val();
        
        if (data) {
            const keys = Object.keys(data);
            if (keys.length > lastOrderCount) {
                sound.play().catch(() => {});
            }
            lastOrderCount = keys.length;

            keys.forEach(id => {
                const order = data[id];
                let itemsHtml = "";
                for (let n in order.items) {
                    itemsHtml += `<li><span>${n}</span> <span>x${order.items[n].qty}</span></li>`;
                }

                const card = document.createElement('div');
                card.className = "order-card";
                card.innerHTML = `
                    <div class="order-body">
                        <div class="order-id">ID: ${id.slice(-6).toUpperCase()}</div>
                        <span class="buyer-name">${order.pembeli}</span>
                        <span class="method-tag">${order.metode}</span>
                        <ul class="item-list">${itemsHtml}</ul>
                        <div style="display:flex; justify-content:space-between; align-items:center;">
                            <span style="font-size:0.8rem; color:#888;">${order.waktu}</span>
                            <span class="total-price">Rp ${order.total.toLocaleString()}</span>
                        </div>
                    </div>
                    <button class="btn-done" onclick="selesaikanPesanan('${id}')">SELESAI & SIMPAN</button>
                `;
                orderContainer.appendChild(card);
            });
        } else {
            lastOrderCount = 0;
            orderContainer.innerHTML = "<div style='grid-column: 1/-1; text-align:center; padding: 50px; color: #999;'>Belum ada pesanan masuk...</div>";
        }
    });

    window.selesaikanPesanan = function(id) {
        const orderRef = ref(db, 'pesanan/' + id);
        onValue(orderRef, (snapshot) => {
            const dataPesanan = snapshot.val();
            if (dataPesanan) {
                const laporanRef = ref(db, 'laporan');
                push(laporanRef, { ...dataPesanan, waktu_selesai: new Date().toLocaleString() })
                .then(() => remove(orderRef));
            }
        }, { onlyOnce: true });
    }
</script>
</body>
</html>
